name: adenmgb-homewebsite

services:
  web:
    image: ghcr.io/adenmgb/webyuh:latest
    container_name: adenmgb-homewebsite
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
